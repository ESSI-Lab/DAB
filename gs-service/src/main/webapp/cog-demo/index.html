<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Optimezed GeoTIFF (COG) Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.9.0/ol.css">
    <link rel="stylesheet" href="main.css">
    <script type="importmap">
        {
          "imports": {
            "ol": "https://esm.sh/ol@10.9.0",
            "ol/": "https://esm.sh/ol@10.9.0/"
          }
        }
    </script>
    <style>
        body {
          margin: 0;
          font-family: sans-serif;
        }
        #controls {
          padding: 8px;
          background: #f5f5f5;
          border-bottom: 1px solid #ccc;
        }
        .map {
          width: 100%;
          height: 400px;
        }
    </style>
</head>
<body>
<!-- ✅ TIME SLIDER
<div id="controls">
    <input
            type="range"
            id="timeSlider"
            min="0"
            step="1"
            value="0"
            style="width: 300px"
    />
    <span id="timeLabel" style="margin-left: 10px"></span>
</div>
-->



<div id="controls">

    <div class="time-nav">
        <button id="prevStep">◀</button>
        <input type="range" id="forecastSlider">
        <button id="nextStep">▶</button>
    </div>

    <div id="timeMain" class="time-main"></div>

    <div id="timeLayers" class="time-layers"></div>

</div>



<!-- ✅ MAP -->
<div id="map" class="map"></div>



<label>
    <input type="checkbox" id="chkShiwe" checked>
    SHIWE
</label>

<label>
    <input type="checkbox" id="chkTemp">
    Temperature
</label>

<label>
    <input type="checkbox" id="chkUtci">
    UTCI
</label>

<label>
    <input type="checkbox" id="chkHumidity">
    Humidity
</label>


<div id="legend" class="legend"></div>


<!-- ✅ SCRIPT -->
<script type="module" src="main.js"></script>

</body>
</html>
